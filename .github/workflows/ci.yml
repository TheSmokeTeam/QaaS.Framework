name: CI

on:
  push:
    branches: ["**"]
    tags: ["*"]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  CONFIGURATION: Release
  # Change this to your .sln path (or set to a project file if you don't use a solution).
  SOLUTION: YourSolution.sln

jobs:
  build_test_pack:
    name: Restore / Build / Test (and Pack on tags)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read # needed only if you restore from GitHub Packages

    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"
          cache: true
          # FIX: ensure these paths resolve (requires committed lock files)
          cache-dependency-path: |
            **/packages.lock.json

      - name: Configure GitHub Packages feed (restore/push)
        run: |
          dotnet nuget remove source github 2>/dev/null || true
          dotnet nuget add source \
            --name github \
            --username "${{ github.actor }}" \
            --password "${{ secrets.GITHUB_TOKEN }}" \
            --store-password-in-clear-text \
            "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json"

      - name: Restore (locked)
        run: dotnet restore "${{ env.SOLUTION }}" --locked-mode

      - name: Build
        run: dotnet build "${{ env.SOLUTION }}" -c "${{ env.CONFIGURATION }}" --no-restore

      - name: Test
        run: dotnet test "${{ env.SOLUTION }}" -c "${{ env.CONFIGURATION }}" --no-build

      - name: Compute package version from tag
        if: startsWith(github.ref, 'refs/tags/')
        id: ver
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"

          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+([\-][0-9A-Za-z\.\-]+)?$ ]]; then
            echo "Tag '$TAG' -> version '$VERSION' is not a valid NuGet version. Use tags like v1.2.3 or 1.2.3 or 1.2.3-alpha."
            exit 1
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Pack (tags only)
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          dotnet pack "${{ env.SOLUTION }}" \
            -c "${{ env.CONFIGURATION }}" \
            --no-build \
            -p:ContinuousIntegrationBuild=true \
            -p:PackageVersion="${{ steps.ver.outputs.version }}" \
            -o ./artifacts

      - name: Upload NuGet packages artifact (tags only)
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v6
        with:
          name: nupkgs
          path: ./artifacts/*.nupkg

  publish:
    name: Push to GitHub Packages (tags only)
    runs-on: ubuntu-latest
    needs: build_test_pack
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: read
      packages: write

    steps:
      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Download packed artifacts
        uses: actions/download-artifact@v7
        with:
          name: nupkgs
          path: ./artifacts

      - name: Configure GitHub Packages feed
        run: |
          dotnet nuget remove source github 2>/dev/null || true
          dotnet nuget add source \
            --name github \
            --username "${{ github.actor }}" \
            --password "${{ secrets.GITHUB_TOKEN }}" \
            --store-password-in-clear-text \
            "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json"

      - name: Push packages
        run: |
          dotnet nuget push "./artifacts/*.nupkg" \
            --source github \
            --skip-duplicate
